owner = "maxbeizer"

[discovery]
auto = true
exclude = ["gh-aw-trial", "gh-combine-dependabot-prs", "gh-ghostty"]

[[sync.files]]
canon = "canon/copilot-instructions.md"
target = ".github/copilot-instructions.md"
skip_if_exists = true

[[sync.files]]
canon = "canon/ci.yml"
target = ".github/workflows/ci.yml"

[[sync.files]]
canon = "canon/release.yml"
target = ".github/workflows/release.yml"

[[sync.files]]
canon = "canon/goreleaser.yml"
target = ".goreleaser.yml"
template = true

[[sync.files]]
canon = "canon/LICENSE"
target = "LICENSE"

[[sync.files]]
canon = "canon/Makefile"
target = "Makefile"
template = true

[sync.template_vars]
GO_MIN_MAJOR = "1"
GO_MIN_MINOR = "24"
GO_MIN_PATCH = "0"

[catalog]
output = "README.md"
header = "canon/readme-header.md"

[settings]
has_wiki = false
delete_branch_on_merge = true
allow_squash_merge = true
allow_merge_commit = false
allow_rebase_merge = false
